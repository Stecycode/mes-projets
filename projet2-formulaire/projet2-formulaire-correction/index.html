<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        form {
            background-color:rgb(227, 213, 195);
            height: 80vh;
            width:450px ;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 25px;
        }
        form > div{
            width: 100%;
            height: 100%;
        }
        
        .div2{
            display: flex;
            justify-content:space-evenly;

        }
        .div2 > div{
            width: 50%;
        }
        .div4{
            display: flex;
            justify-content:space-evenly;
            padding-top: 20px;
            padding-bottom: 15px;
        }
        .div4 > div{
            width: 50%;
        }
        .div7{
            align-content: center;
            
        }
        .div7 > div {
            height: 75%;
            width: 65%;
            input {
                width:100%;
                height:80%
            }
        }
        .div3{
            display: inline-block;
            width: 460px;
            input{
                height: 40%;
            }
            }
        input {
            width: 95%;
            height: 40%;
        }
        #point{
            border-radius: 0%;
            padding: 10px; 
            width:20%;
            height: 20px;;
        }
        .div6{
            display: flex;
            calign-items: start; 
        }
    #envoie{
        background-color: rgb(13, 13, 42);
        font-size: large;
        color: white;
    }
    textarea{
        padding: 5px;
        height: 65px;
        width: 440px;
    }
    </style>
</head>
<body>
    <form>
        <div> <h1> Formulaire de contact</h1> </div>
        <div class="div2">
            <div>
                 <label for="prenom">Prénom</label> 
                 <input type="text" id="prenom" name="prénom">
            </div>
            <div>
                <label for="nom">Nom</label> 
                 <input type="text" id="nom" name="nom">
            </div>
        </div>
        <div class="div3">
            <label for="email">E-mail</label> 
            <input type="mail" id="email" name="adresse email">
        </div>
        <div class="div3">
            <label for="objet">Objet</label> 
            <input type="text" id="objet" name="objet">
        </div>
        <div class="div3">
            <label for="message">Message</label> 
            <textarea id="message" placeholder="votre message"></textarea>
        </div>
        <div class="div4">
            <div>
                <label for="num">Que font 7+2?</label> 
                <input type="number" id="num" name="number">
            </div>
            <div class="div6"> <label for="point"> </label> 
                 <input type="checkbox" id="point" >
                 j'accepte que mon e-mail soit stocké pour apporter une reponse    
            </div>
        </div>
        <div class="div7">
            <div>  <input type="submit" id="envoie" value="J'ENVOIE LE MESSAGE">
        </div>
        </div>
    </form>
</body>
</html>
